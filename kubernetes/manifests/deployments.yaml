w {{\n            0% {{ transform: scale(1) translate(0, 0); }}\n            100% {{ transform: scale(1.1) translate(20px, 20px); }}\n        }}\n        .card {{\n            background: var(--glass);\n            backdrop-filter: blur(20px);\n            border: 1px solid rgba(255, 255, 255, 0.1);\n            padding: 3rem;\n            border-radius: 2rem;\n            text-align: center;\n            max-width: 500px;\n            width: 90%;\n            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);\n        }}\n        h1 {{ font-size: 6rem; font-weight: 900; background: linear-gradient(to bottom right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }}\n        .oops {{ font-size: 1.5rem; font-weight: 600; margin: 1rem 0; color: #e2e8f0; }}\n        p {{ color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; }}\n        .host {{ background: rgba(99, 102, 241, 0.2); color: #818cf8; padding: 0.2rem 0.6rem; border-radius: 0.5rem; font-family: monospace; border: 1px solid rgba(99, 102, 241, 0.3); }}\n        .btn {{ display: inline-block; background: white; color: var(--bg-dark); padding: 0.8rem 2rem; border-radius: 1rem; text-decoration: none; font-weight: 700; transition: transform 0.2s, background 0.2s; }}\n        .btn:hover {{ transform: translateY(-2px); background: #f1f5f9; }}\n    \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n    \u003cdiv class=\"aurora\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"card\"\u003e\n        \u003ch1\u003e404\u003c/h1\u003e\n        \u003cdiv class=\"oops\"\u003eRoute Not Found\u003c/div\u003e\n        \u003cp\u003eIt seems like \u003cspan class=\"host\"\u003e{host}\u003c/span\u003e isn't mapped to a service yet.\u003c/p\u003e\n        \u003ca href=\"https://jdools.com\" class=\"btn\"\u003eReturn Home\u003c/a\u003e\n    \u003c/div\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n\"\"\".encode('utf-8'))\n\nserver = HTTPServer(('0.0.0.0', 8080), Handler)\nprint(\